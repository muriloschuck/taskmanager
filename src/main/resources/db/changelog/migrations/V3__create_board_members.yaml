databaseChangeLog:
  - changeSet:
      id: 3
      author: taskmanager
      changes:
        - createTable:
            tableName: board_members
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: board_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bm_board
                    references: boards(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bm_user
                    references: users(id)
              - column:
                  name: role
                  type: varchar(20)
                  defaultValue: MEMBER
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: board_members
            columnNames: board_id, user_id
            constraintName: uq_board_member