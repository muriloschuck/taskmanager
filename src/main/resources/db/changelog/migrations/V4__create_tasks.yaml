databaseChangeLog:
  - changeSet:
      id: 4
      author: taskmanager
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(10)
                  defaultValue: MEDIUM
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: date
              - column:
                  name: board_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tasks_board
                    references: boards(id)
                    deleteCascade: true
              - column:
                  name: assigned_user_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_tasks_user
                    references: users(id)
                    deleteCascade: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false