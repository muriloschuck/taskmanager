spring.application.name=taskmanager
jwt.secret=${JWT_SECRET:defaultDevSecretThatShouldBeOverridden1234567890SecretKeyLongEnough}

spring.datasource.url=jdbc:postgresql://localhost:5432/taskmanager
spring.datasource.username=admin
spring.datasource.password=adminpass
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.enabled=true
spring.liquibase.changelog=classpath:db/changelog/db.changelog-master.xml

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.unisinos=DEBUG
logging.level.org.liquibase=INFO
logging.level.liquibase=DEBUG
